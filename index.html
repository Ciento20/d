<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN Live TV - Ultra Metadata Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .event-card:hover { border-color: #3b82f6; transform: scale(1.02); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #111827; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .status-live { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex overflow-hidden">

    <aside class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col hidden lg:flex">
        <div class="p-6">
            <div class="flex items-center space-x-3 mb-10">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i class="fas fa-satellite text-white text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tighter">CDN LIVE <span class="text-blue-500">ULTRA</span></h1>
            </div>

            <nav class="space-y-6">
                <div>
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Explorar</p>
                    <ul class="space-y-2">
                        <li><button onclick="renderAllChannels()" class="w-full text-left px-4 py-2 rounded-md hover:bg-gray-800 transition flex items-center"><i class="fas fa-tv w-6 text-blue-500"></i> Todos los Canales</button></li>
                        <li><button onclick="renderAllSports()" class="w-full text-left px-4 py-2 rounded-md hover:bg-gray-800 transition flex items-center"><i class="fas fa-trophy w-6 text-yellow-500"></i> Eventos Deportivos</button></li>
                    </ul>
                </div>

                <div>
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Categorías Pro</p>
                    <ul class="space-y-2 text-sm text-gray-400">
                        <li><button onclick="filterSport('Soccer')" class="hover:text-white transition flex items-center"><i class="fas fa-futbol w-6"></i> Soccer / Fútbol</button></li>
                        <li><button onclick="filterSport('NBA')" class="hover:text-white transition flex items-center"><i class="fas fa-basketball-ball w-6"></i> NBA Basketball</button></li>
                        <li><button onclick="filterSport('NFL')" class="hover:text-white transition flex items-center"><i class="fas fa-football-ball w-6"></i> NFL Football</button></li>
                        <li><button onclick="filterSport('NHL')" class="hover:text-white transition flex items-center"><i class="fas fa-hockey-puck w-6"></i> NHL Hockey</button></li>
                    </ul>
                </div>
            </nav>
        </div>
        
        <div class="mt-auto p-6 border-t border-gray-800">
            <div class="flex items-center space-x-3">
                <div id="api-status-dot" class="w-3 h-3 bg-green-500 rounded-full status-live"></div>
                <span class="text-xs font-bold text-gray-400 uppercase">API Online (v1.0)</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        
        <header class="h-20 bg-gray-900/50 flex items-center justify-between px-8 border-b border-gray-800">
            <div class="flex-1 max-w-2xl">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="globalSearch" onkeyup="searchEngine()" placeholder="Buscar equipo, torneo, país o canal..." 
                           class="w-full bg-gray-800/50 border border-gray-700 rounded-xl py-2.5 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>
            </div>
            <div class="flex items-center space-x-4 ml-4">
                <span class="bg-gray-800 px-3 py-1 rounded-full text-xs font-bold border border-gray-700">PLAN: FREE</span>
            </div>
        </header>

        <div id="main-scroll" class="flex-1 overflow-y-auto p-8 custom-scroll bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-gray-900 to-gray-950">
            
            <div id="dynamic-content" class="space-y-12">
                <div class="flex items-center justify-center h-64">
                    <div class="text-center">
                        <i class="fas fa-circle-notch animate-spin text-4xl text-blue-500 mb-4"></i>
                        <p class="text-gray-400">Inyectando metadatos de la API...</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="playerModal" class="fixed inset-0 bg-black/95 z-50 hidden flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-6xl">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center space-x-4">
                    <img id="modal-logo" src="" class="h-10 w-10 object-contain bg-gray-800 rounded p-1">
                    <div>
                        <h2 id="modal-title" class="text-xl font-bold">--</h2>
                        <p id="modal-meta" class="text-xs text-gray-400 font-medium"></p>
                    </div>
                </div>
                <button onclick="closePlayer()" class="text-gray-400 hover:text-white text-3xl transition">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>
            <div class="aspect-video bg-black rounded-2xl overflow-hidden shadow-2xl border border-gray-800">
                <div id="player-target" class="w-full h-full"></div>
            </div>
            <div class="mt-4 grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-tighter">Status de Señal</p>
                    <p class="text-sm font-bold text-green-400"><i class="fas fa-broadcast-tower mr-2"></i> Estable (HD)</p>
                </div>
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-tighter">Espectadores</p>
                    <p id="modal-viewers" class="text-sm font-bold">--</p>
                </div>
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-tighter">Información API</p>
                    <p class="text-[10px] text-gray-500">cdn-live.tv/v1/player/ready</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_USER = 'cdnlivetv';
        const API_PLAN = 'free';
        let store = {
            channels: [],
            sports: {},
            allMetadata: []
        };

        // Inicialización Total
        async function init() {
            try {
                const [chRes, spRes] = await Promise.all([
                    fetch(`https://api.cdn-live.tv/api/v1/channels/?user=${API_USER}&plan=${API_PLAN}`),
                    fetch(`https://api.cdn-live.tv/api/v1/events/sports/?user=${API_USER}&plan=${API_PLAN}`)
                ]);

                const chData = await chRes.json();
                const spData = await spRes.json();

                store.channels = chData.channels;
                store.sports = spData['cdn-live-tv'];
                
                renderAllSports(); // Empezamos por deportes que tienen más metadatos
            } catch (err) {
                document.getElementById('dynamic-content').innerHTML = `
                    <div class="bg-red-900/20 border border-red-500 p-8 rounded-2xl text-center">
                        <i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-4"></i>
                        <h2 class="text-xl font-bold">Error de Conexión</h2>
                        <p class="text-gray-400">No se pudieron recuperar los metadatos de la API.</p>
                    </div>
                `;
            }
        }

        // Renderizado de Deportes (Full Metadata)
        function renderAllSports() {
            const container = document.getElementById('dynamic-content');
            container.innerHTML = '<h2 class="text-3xl font-black italic uppercase tracking-tighter text-blue-500">Eventos en Vivo & Próximos</h2>';

            const categories = ['Soccer', 'NBA', 'NFL', 'NHL'];
            
            categories.forEach(cat => {
                const events = store.sports[cat] || [];
                if(events.length === 0) return;

                const section = document.createElement('div');
                section.className = "space-y-4 animate-in fade-in duration-500";
                section.innerHTML = `
                    <div class="flex items-center space-x-4 border-b border-gray-800 pb-2">
                        <h3 class="text-xl font-bold">${cat}</h3>
                        <span class="bg-blue-600/20 text-blue-400 text-[10px] font-bold px-2 py-0.5 rounded">${events.length} EVENTOS</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                        ${events.map(ev => renderEventCard(ev, cat)).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function renderEventCard(ev, category) {
            const isLive = ev.status === 'live';
            const statusColor = isLive ? 'bg-red-600 text-white status-live' : 'bg-gray-700 text-gray-300';
            
            return `
                <div class="glass p-5 rounded-2xl event-card transition border border-gray-800 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center space-x-2">
                                <img src="${ev.countryIMG}" class="h-4 w-6 rounded-sm shadow-sm" title="${ev.country}">
                                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${ev.tournament}</span>
                            </div>
                            <span class="text-[9px] font-black px-2 py-0.5 rounded-full uppercase ${statusColor}">${ev.status}</span>
                        </div>

                        <div class="flex items-center justify-between py-4">
                            <div class="flex flex-col items-center w-1/3 text-center">
                                <img src="${ev.homeTeamIMG}" class="h-12 w-12 object-contain mb-2 drop-shadow-lg" onerror="this.src='https://via.placeholder.com/100?text=TEAM'">
                                <span class="text-xs font-bold leading-tight">${ev.homeTeam}</span>
                            </div>
                            <div class="flex flex-col items-center">
                                <span class="text-xs font-black text-gray-600">VS</span>
                                <span class="text-[10px] text-gray-500 mt-1 font-mono">${ev.time}</span>
                            </div>
                            <div class="flex flex-col items-center w-1/3 text-center">
                                <img src="${ev.awayTeamIMG}" class="h-12 w-12 object-contain mb-2 drop-shadow-lg" onerror="this.src='https://via.placeholder.com/100?text=TEAM'">
                                <span class="text-xs font-bold leading-tight">${ev.awayTeam}</span>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 space-y-2">
                        <p class="text-[9px] font-bold text-gray-500 uppercase">Señales Disponibles:</p>
                        ${ev.channels.map(ch => `
                            <button onclick="openPlayer('${ch.url}', '${ev.homeTeam} vs ${ev.awayTeam}', '${ch.image}', '${ch.viewers}', '${category}', '${ch.channel_code}')" 
                                    class="w-full bg-gray-800 hover:bg-blue-600 p-2 rounded-xl flex items-center justify-between transition group">
                                <div class="flex items-center">
                                    <img src="${ch.image}" class="h-6 w-6 object-contain bg-white/10 rounded p-0.5 mr-3">
                                    <div class="flex flex-col items-start">
                                        <span class="text-[11px] font-semibold">${ch.channel_name}</span>
                                        <span class="text-[8px] text-gray-500 group-hover:text-blue-100 uppercase font-bold">Región: ${ch.channel_code || 'INT'}</span>
                                    </div>
                                </div>
                                <div class="flex items-center space-x-2">
                                    <div class="flex flex-col items-end mr-2">
                                        <span class="text-[9px] text-gray-400 group-hover:text-blue-100"><i class="fas fa-users mr-1"></i>${ch.viewers}</span>
                                        <span class="text-[7px] text-green-500 font-bold uppercase tracking-tighter">● ONLINE</span>
                                    </div>
                                    <i class="fas fa-play-circle text-blue-500 group-hover:text-white text-lg"></i>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // Renderizado de Canales (Metadata de País)
        function renderAllChannels() {
            const container = document.getElementById('dynamic-content');
            container.innerHTML = '<h2 class="text-3xl font-black italic uppercase tracking-tighter text-blue-500 mb-6">Red Global de Canales</h2>';

            // Agrupar por país usando metadatos 'code'
            const countries = [...new Set(store.channels.map(c => c.code))];
            
            countries.forEach(countryCode => {
                const countryChannels = store.channels.filter(c => c.code === countryCode);
                const section = document.createElement('div');
                section.className = "mb-10";
                section.innerHTML = `
                    <div class="flex items-center space-x-3 mb-6">
                        <img src="https://flagcdn.com/w40/${countryCode.toLowerCase()}.png" class="h-5 rounded-sm shadow" onerror="this.style.display='none'">
                        <h3 class="text-lg font-bold uppercase tracking-widest">${countryCode} Territory</h3>
                        <span class="h-[1px] flex-1 bg-gray-800"></span>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                        ${countryChannels.map(ch => `
                            <div onclick="openPlayer('${ch.url}', '${ch.name}', '${ch.image}', '${ch.viewers}', 'General', '${ch.code}')" 
                                 class="bg-gray-900 border border-gray-800 p-4 rounded-2xl cursor-pointer hover:bg-gray-800 transition group relative overflow-hidden">
                                <div class="absolute top-2 right-2">
                                    <span class="flex h-2 w-2">
                                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full ${ch.status === 'online' ? 'bg-green-400' : 'bg-red-400'} opacity-75"></span>
                                        <span class="relative inline-flex rounded-full h-2 w-2 ${ch.status === 'online' ? 'bg-green-500' : 'bg-red-500'}"></span>
                                    </span>
                                </div>
                                <div class="h-16 flex items-center justify-center mb-3">
                                    <img src="${ch.image}" class="max-h-full max-w-full object-contain group-hover:scale-110 transition duration-300">
                                </div>
                                <p class="text-[11px] font-bold truncate text-center mb-1">${ch.name}</p>
                                <p class="text-[9px] text-center text-gray-500 uppercase mb-2">Territorio: ${ch.code}</p>
                                <div class="flex items-center justify-between text-[9px] font-bold border-t border-gray-800 pt-2">
                                    <span class="${ch.status === 'online' ? 'text-green-500' : 'text-red-500'} uppercase">${ch.status}</span>
                                    <span class="text-gray-500"><i class="fas fa-users mr-1"></i>${ch.viewers}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        // Filtro Específico por Categoría
        function filterSport(cat) {
            const container = document.getElementById('dynamic-content');
            container.innerHTML = `<h2 class="text-3xl font-black italic uppercase tracking-tighter text-blue-500 mb-6">${cat} - Metadatos de Temporada</h2>`;
            const events = store.sports[cat] || [];
            
            if(events.length === 0) {
                container.innerHTML += `<p class="text-gray-500">No hay eventos activos para ${cat} en este momento.</p>`;
                return;
            }

            const grid = document.createElement('div');
            grid.className = "grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6";
            grid.innerHTML = events.map(ev => renderEventCard(ev, cat)).join('');
            container.appendChild(grid);
        }

        // Motor de Búsqueda de Metadatos
        function searchEngine() {
            const query = document.getElementById('globalSearch').value.toLowerCase();
            if(!query) return renderAllSports();

            const filteredChannels = store.channels.filter(c => 
                c.name.toLowerCase().includes(query) || c.code.toLowerCase().includes(query)
            );

            const container = document.getElementById('dynamic-content');
            container.innerHTML = `<h2 class="text-xl font-bold mb-6">Resultados para: "${query}"</h2>`;
            
            if(filteredChannels.length > 0) {
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-2 md:grid-cols-6 gap-4";
                grid.innerHTML = filteredChannels.map(ch => `
                    <div onclick="openPlayer('${ch.url}', '${ch.name}', '${ch.image}', '${ch.viewers}', 'Búsqueda')" class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center cursor-pointer">
                        <img src="${ch.image}" class="h-10 mx-auto mb-2 object-contain">
                        <p class="text-[10px] font-bold truncate">${ch.name}</p>
                    </div>
                `).join('');
                container.appendChild(grid);
            } else {
                container.innerHTML += `<p class="text-gray-500">No se encontraron canales o equipos con esos metadatos.</p>`;
            }
        }

        // Control del Reproductor
        function openPlayer(url, title, logo, viewers, cat, country = 'GLOBAL') {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-logo').src = logo;
            document.getElementById('modal-meta').innerText = `${cat} | Origen: ${country.toUpperCase()} | Canal Verificado`;
            document.getElementById('modal-viewers').innerHTML = `<i class="fas fa-users text-blue-500 mr-2"></i> ${viewers} viendo ahora`;
            
            document.getElementById('player-target').innerHTML = `
                <iframe src="${url}" 
                        width="100%" 
                        height="100%" 
                        frameborder="0" 
                        allow="encrypted-media" 
                        allowfullscreen></iframe>
            `;
            document.getElementById('playerModal').classList.remove('hidden');
        }

        function closePlayer() {
            document.getElementById('playerModal').classList.add('hidden');
            document.getElementById('player-target').innerHTML = '';
        }

        // Init App
        init();
    </script>
</body>
</html>
