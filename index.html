(--channel-bg);color:var(--text-main);border-radius:10px;text-align:center;font-size:.65rem;font-weight:600;border:1px solid var(--border-color);display:flex;align-items:center;justify-content:center;flex:0 0 119px;height:67px;scroll-snap-align:start;overflow:hidden;padding:8px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 6px rgba(0,0,0,.3)}.channel-button:active{transform:scale(.95)}.btn-plus{position:absolute;bottom:0;right:0;width:40px;height:40px;background:transparent;color:transparent;display:flex;align-items:center;justify-content:center;z-index:10;cursor:pointer}.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:none;justify-content:center;align-items:center;z-index:2000}.modal-content{background:var(--card-bg);width:85%;max-width:280px;max-height:80vh;overflow-y:auto;border-radius:12px;padding:15px;border:1px solid var(--border-color)}.modal-title{margin-bottom:12px;font-size:.8rem;font-weight:700;text-align:center;color:var(--accent-blue)}.id-item{background:var(--channel-bg);padding:10px;margin-bottom:8px;border-radius:8px;font-size:.7rem;text-align:center;border:1px solid var(--border-color);cursor:pointer;display:flex;justify-content:space-between;align-items:center}.id-rating{color:var(--accent-blue);font-weight:700}.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:48px;background:var(--nav-bg);border-top:1px solid var(--border-color);display:flex;justify-content:space-around;align-items:center;z-index:1000}.nav-item{display:flex;flex-direction:column;align-items:center;color:var(--text-muted);text-decoration:none;font-size:.55rem;font-weight:600;gap:2px;flex:1;cursor:pointer}        .nav-item.active{color:var(--accent-blue)}.nav-icon{font-size:1rem}#status{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);z-index:10000;display:flex;align-items:center;justify-content:center}.spinner{width:48px;height:48px;border:5px solid color-mix(in srgb, var(--accent-blue) 20%, transparent);border-top:5px solid var(--accent-blue);border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}/* Corrección: El modo búsqueda ahora respeta el layout global */

    <div id="loader-container">

    </div><div id="status"><div class="spinner"></div></div><div id="searchContainer" style="display:none;width:95%;max-width:500px;margin:10px auto 0 auto;gap:8px;align-items:center;padding-bottom:10px;"><div style="position:relative;flex:1;display:flex;align-items:center"><input type="text" id="globalSearchInput" placeholder="Buscar canal, equipo o competición..." style="width:100%;padding:12px 40px 12px 16px;border-radius:12px;border:1px solid var(--border-color);background:var(--card-bg);color:#fff;font-size:.9rem;outline:0"><span id="clearSearch" style="position:absolute;right:12px;color:var(--text-muted);cursor:pointer;display:none;font-size:1.2rem;user-select:none">&times;</span></div></div><div id="events-container"></div>
<div id="noResultsContainer" style="display:none;text-align:center;padding:40px;color:var(--text-muted)"><div><div style="font-size:3rem;margin-bottom:10px">📡</div><div style="font-weight:700;font-size:1.1rem;color:var(--text-main)">Sin resultados</div><div style="font-size:.85rem;margin-top:5px;opacity:.8">Intenta con otra búsqueda</div></div></div><div id="ids-modal" class="modal-overlay" onclick="UIManager.closeModal(event)"><div class="modal-content" onclick="event.stopPropagation()"><div id="modal-title" class="modal-title">Canales</div><div id="ids-list" class="ids-list"></div></div></div>

    
    <div id="player-modal" class="modal-overlay" onclick="UIManager.closePlayer()">
        <div class="modal-content" style="max-width: 800px; width: 95%; background: #000; padding: 0; overflow: hidden; position: relative; border-radius: 12px;" onclick="event.stopPropagation()">
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #1a1a1a; border-bottom: 1px solid #333;">
                <div id="player-tabs" style="display: flex; gap: 5px;"></div>
                <button onclick="UIManager.closePlayer()" style="background: none; color: white; border: none; font-size: 1.5rem; cursor: pointer; line-height: 1;">&times;</button>
            </div>
            <div style="width: 100%; aspect-ratio: 16/9; background: #000;">
                <iframe id="video-iframe" src="" width="100%" height="100%" style="border:0;" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
        </div>
    </div><nav class="bottom-nav"><div class="nav-item active" id="nav-home" onclick='UIManager.switchTab("home")'><span class="nav-icon">🗓️</span><span>EVENTOS</span></div><div class="nav-item" id="nav-channels" onclick='UIManager.switchTab("channels")'><span class="nav-icon">🔍</span><span>BUSCAR</span></div></nav><script>const CONFIG = {
            BASE_URL: 'https://dlstreams.top/',
            TARGET_URL: 'https://dlstreams.top/',
            GIST_LOGOS: 'https://gist.githubusercontent.com/Ciento20/f7847e86d06e5011706fa76f2dab90be/raw/',
            PROXIES: [
                'https://corsproxy.io/?'
            ]
        };

        const STORAGE_CONFIG = {
            CACHE_KEY: 'ace_ids_cache',
            EXPIRATION_MS: 30 * 24 * 60 * 60 * 1000 // 30 días
        };        const RatingEngine = {
            DB_KEY: 'ace_autorating_v1',
            SESSION_KEY: 'ace_current_session',
            PENDING_KEY: 'ace_pending_penalties_list',
            interval: null,

            getDB() { return JSON.parse(localStorage.getItem(this.DB_KEY)) || {}; },
            
            getScore(id) { 
                const entry = this.getDB()[id];
                if (!entry) return 3.0;
                return (typeof entry === 'object') ? (entry.score || 3.0) : entry;
            },

            saveScore(id, delta, name = "") {
                const db = this.getDB();
                let entry = db[id];

                // Normalizar entrada (migración de legacy a objeto)
                if (!entry || typeof entry !== 'object') {
                    entry = { score: entry || 3.0, name: name || "Desconocido" };
                }
                
                if (name) entry.name = name;
                entry.score = Math.max(0.0, Math.min(5.0, entry.score + delta));
                
                db[id] = entry;
                localStorage.setItem(this.DB_KEY, JSON.stringify(db));
            },            trackStart(id, channelName, index = 0) {
                this.checkPreviousSession(channelName);
                const now = Date.now();
                this.stopRealTimeUpdate();
                
                const sessionData = {
                    id: id, 
                    channelName: channelName, 
                    index: index,
                    start: now, 
                    lastProcessedMin: 0
                };
                
                localStorage.setItem(this.SESSION_KEY, JSON.stringify(sessionData));
                this.startRealTimeUpdate();
            },

            processFocusReturn(newChannelName) {
                localStorage.removeItem(this.PENDING_KEY);
            },

            checkPreviousSession(newChannelName = null) {
                const session = JSON.parse(localStorage.getItem(this.SESSION_KEY));
                if (!session) return;
                
                const durationSec = (Date.now() - session.start) / 1000;
                
                if (durationSec >= 2400) {
                    localStorage.removeItem(this.SESSION_KEY);
                    localStorage.removeItem(this.PENDING_KEY);
                    return;
                }

                // Evento focus sin pulsar nada (esperamos 4s por si es zapping)
                if (!newChannelName) {
                    if (this.focusTimer) return;
                    this.focusTimer = setTimeout(() => {
                        this.saveScore(session.id, -0.5, session.channelName);
                        localStorage.setItem(this.PENDING_KEY, JSON.stringify({ id: session.id, timestamp: Date.now() }));
                        localStorage.removeItem(this.SESSION_KEY);
                        this.focusTimer = null;
                    }, 60000);
                    return;
                }

                // Se pulsó un canal, cancelamos el timer de focus
                if (this.focusTimer) {
                    clearTimeout(this.focusTimer);
                    this.focusTimer = null;
                }

                // Reintento en el MISMO canal (falla el primer link, prueba el siguiente)
                if (newChannelName === session.channelName) {
                    this.saveScore(session.id, -0.5, session.channelName);
                    localStorage.setItem(this.PENDING_KEY, JSON.stringify({ id: session.id, timestamp: Date.now() }));
                }
                
                // Limpiamos sesión tanto si fue reintento como zapping
                localStorage.removeItem(this.SESSION_KEY);
            },

            startRealTimeUpdate() {
                if (this.interval) clearInterval(this.interval);
                this.interval = setInterval(() => {
                    const session = JSON.parse(localStorage.getItem(this.SESSION_KEY));
                    if (!session) return this.stopRealTimeUpdate();
                    const min = (Date.now() - session.start) / 60000;
                    
                    if (min >= 30 && (min - session.lastProcessedMin) >= 30) {
                        this.saveScore(session.id, 1.0, session.channelName);
                        session.lastProcessedMin = Math.floor(min / 30) * 30;
                        localStorage.setItem(this.SESSION_KEY, JSON.stringify(session));
                    }
                }, 30000);
            },

            stopRealTimeUpdate() { if (this.interval) clearInterval(this.interval); }
        };        const cleanChannelName = (name) => {
            if (!name) return "";
            return name.normalize("NFD")
                       .replace(/[\u0300-\u036f]/g, "")
                       .toUpperCase()
                       .replace(/\b(HD|FHD|4K|1080P|720P|SD|TVE|ES|SOLO EVENTOS|PLUS|BAR)\b/g, "")
                       .replace(/[\(\)\[\]\*]/g, " ")
                       .replace(/\s+/g, " ")
                       .trim();
        };

        const ComparisonEngine = {
            isMatch(nameA, nameB) {
                return getCanonicalName(nameA) === getCanonicalName(nameB);
            },
            normalizeText(text) {
                return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            }
        };        let channelLogosMap = JSON.parse(localStorage.getItem('logo_cache')) || {};
        let channelCanonicalMap = JSON.parse(localStorage.getItem('canonical_cache')) || {};
        let globalData = JSON.parse(localStorage.getItem('event_data_cache')) || [];
        let aceStreamMap = []; 
        let currentTab = localStorage.getItem('active_tab') || 'home';
        const state = { tvSearchTerm: localStorage.getItem('search_query') || '' };

        const getCanonicalName = (name) => {
            const clean = cleanChannelName(name);
            return channelCanonicalMap[clean] || clean;
        };

        const NetworkService = {
            async fetchHtml(targetUrl) {
                const fetchPromises = CONFIG.PROXIES.map(proxy => 
                    fetch(`${proxy}${encodeURIComponent(targetUrl)}`)
                        .then(res => { if (!res.ok) throw new Error(); return res.text(); })
                );
                try { return await Promise.any(fetchPromises); } 
                catch (e) { throw new Error("Error de conexión"); }
            },
            async fetchLogos() {
                try {
                    const response = await fetch(CONFIG.GIST_LOGOS);
                    const text = await response.text();
                    const logoMap = {};
                    const canonicalMap = {};
                    let currentAliases = [];

                    text.split('\n').forEach(line => {
                        const trimmed = line.trim();
                        if (!trimmed) return;

                        if (trimmed.includes(': http')) {
                            const parts = trimmed.split(': http');
                            const canonicalName = cleanChannelName(parts[0]);
                            const logoUrl = 'http' + parts[1].trim();
                            
                            logoMap[canonicalName] = logoUrl;
                            canonicalMap[canonicalName] = canonicalName;
                            
                            currentAliases.forEach(alias => {
                                canonicalMap[cleanChannelName(alias)] = canonicalName;
                            });
                            currentAliases = [];
                        } else {
                            currentAliases.push(trimmed);
                        }
                    });
                    return { logoMap, canonicalMap };
                } catch (e) { return null; }
            }
        };

        const AceStreamEngine = {
            SOURCES: [],
            generateHash(str){let hash=5381,i=str.length;while(i)hash=(hash*33)^str.charCodeAt(--i);return(hash>>>0).toString(16)},            async init(html) {
                if (!html) return [];
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const links = doc.querySelectorAll('.schedule__channels a');
                const results = [];
                links.forEach(link => {
                    const name = link.innerText.trim();
                    const href = link.getAttribute('href');
                    const idMatch = href ? href.match(/id=(\d+)/) : null;
                    if (idMatch) {
                        results.push({
                            name: name,
                            id: 'https://dlstreams.top/watch.php?id=' + idMatch[1],
                            source: 'WEB'
                        });
                    }
                });
                return results;
            },            saveToCache(data, hashes = {}) {
                const cacheObj = { 
                    timestamp: Date.now(), 
                    data: data, 
                    hashes: hashes 
                };
                localStorage.setItem(STORAGE_CONFIG.CACHE_KEY, JSON.stringify(cacheObj));
            },            loadFromCache() {
                return [];
            },
            parseEra(text) {
                const results = [];
                const lines = text.split('\n').filter(l => l.trim());
                for (let i = 0; i < lines.length; i += 2) {
                    let name = lines[i].split('-->')[0].trim();
                    // Limpieza de sufijos de calidad específicos de ERA
                    name = name.replace(/\b(HDP|SDP|FHDP)\b/gi, '').trim();
                    const id = lines[i+1]?.trim().replace(/p$/, '');
                    if (id && id.length === 40) results.push({ name, id });
                }
                return results;
            },
            parseElcano(html) {
                const jsonMatch = html.match(/const links\s*=\s*(\[[\s\S]*?\]);/);
                if (!jsonMatch) return [];
                try {
                    return JSON.parse(jsonMatch[1])
                        .filter(l => l.url.includes('acestream://'))
                        .map(l => ({ 
                            name: l.name.trim(), 
                            id: l.url.split('://')[1] 
                        }));
                } catch (e) { return []; }
            }
        };        const LiveEngine = {
            checkLive(event) {
                const fechaLimpia = event.fecha.toLowerCase();
                if (!fechaLimpia.includes("hoy") && !fechaLimpia.includes("directo")) return false;
                
                const now = new Date();
                const [hrs, mins] = event.hora.split(':').map(Number);
                const startTime = new Date();
                startTime.setHours(hrs, mins, 0, 0);

                // Extraemos todo el texto (competición + detalles del evento como "Libres" o "Carrera")
                const searchPool = (event.competition + ' ' + event.infoHtml.replace(/<[^>]*>?/gm, '')).toUpperCase();

                // JERARQUÍA DE TIEMPOS CONCRETOS
                const specificDurations = [
                    // FÓRMULA 1
                    { key: 'FÓRMULA 1', sub: 'LIBRES', duration: 75 },
                    { key: 'FÓRMULA 1', sub: 'CLASIFICACIÓN', duration: 85 },
                    { key: 'FÓRMULA 1', sub: 'SPRINT', duration: 65 },
                    { key: 'FÓRMULA 1', sub: 'CARRERA', duration: 145 },
                    { key: 'FÓRMULA 1', duration: 130 }, // Genérico F1

                    // MOTOGP
                    { key: 'MOTOGP', sub: 'LIBRES', duration: 65 },
                    { key: 'MOTOGP', sub: 'CLASIFICACIÓN', duration: 70 },
                    { key: 'MOTOGP', sub: 'SPRINT', duration: 55 },
                    { key: 'MOTOGP', sub: 'CARRERA', duration: 85 },
                    { key: 'MOTOGP', duration: 80 },

                    // FÚTBOL (Ligas y Copas)
                    { key: 'CHAMPIONS LEAGUE', duration: 140 },
                    { key: 'EUROPA LEAGUE', duration: 140 },
                    { key: 'COPA DEL REY', duration: 155 },
                    { key: 'LALIGA', duration: 115 },
                    { key: 'PREMIER LEAGUE', duration: 115 },
                    
                    // BALONCESTO
                    { key: 'NBA', duration: 165 },
                    { key: 'EUROLIGA', duration: 135 },
                    { key: 'ACB', duration: 130 },

                    // TENIS
                    { key: 'WIMBLEDON', duration: 260 },
                    { key: 'ROLAND GARROS', duration: 260 },
                    { key: 'ATP 1000', duration: 165 },
                    { key: 'ATP', duration: 145 },

                    // OTROS
                    { key: 'UFC', duration: 240 },
                    { key: 'NFL', duration: 210 }
                ];

                // Tiempos por defecto según el icono si no hay coincidencia específica
                const sportDefaults = {
                    '⚽': 115, '🏀': 130, '🎾': 150, '🥎': 120, '🏎️': 120, 
                    '🏍️': 70, '🚴': 150, '👊': 180, '🤾': 95, '🤽‍♂️': 90 };

                let duration = 120;

                // Lógica de detección: busca primero la combinación (F1 + Libres) 
                const match = specificDurations.find(d => {
                    const hasKey = searchPool.includes(d.key);
                    const hasSub = !d.sub || searchPool.includes(d.sub);
                    return hasKey && hasSub;
                });
