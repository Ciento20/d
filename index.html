<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN Live TV - Ultra Metadata Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; background-color: #000; }
        .event-card { border-radius: 12px; transition: all 0.3s ease; }
        .status-live { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .btn-ch { background: #222; border: 1px solid transparent; aspect-ratio: 16/10; display: flex; align-items: center; justify-content: center; border-radius: 12px; position: relative; transition: transform 0.1s; }
        .btn-ch:active { transform: scale(0.95); }
        .btn-ch img { max-height: 60%; max-width: 80%; object-fit: contain; filter: brightness(1.1); }
    </style>
</head>
<body class="bg-black text-gray-100 min-h-screen flex flex-col">

    
    <aside class="hidden">
        <div class="p-6">
            <div class="flex items-center space-x-3 mb-10">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i class="fas fa-satellite text-white text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tighter">CDN LIVE <span class="text-blue-500">ULTRA</span></h1>
            </div>

            <nav class="space-y-6">
                <div>
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Explorar</p>
                    <ul class="space-y-2">
                        <li><button onclick="renderAllChannels()" class="w-full text-left px-4 py-2 rounded-md hover:bg-gray-800 transition flex items-center"><i class="fas fa-tv w-6 text-blue-500"></i> Todos los Canales</button></li>
                        <li><button onclick="renderAllSports()" class="w-full text-left px-4 py-2 rounded-md hover:bg-gray-800 transition flex items-center"><i class="fas fa-trophy w-6 text-yellow-500"></i> Eventos Deportivos</button></li>
                    </ul>
                </div>

                <div>
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Categorías Pro</p>
                    <ul class="space-y-2 text-sm text-gray-400">
                        <li><button onclick="filterSport('Soccer')" class="hover:text-white transition flex items-center"><i class="fas fa-futbol w-6"></i> Soccer / Fútbol</button></li>
                        <li><button onclick="filterSport('NBA')" class="hover:text-white transition flex items-center"><i class="fas fa-basketball-ball w-6"></i> NBA Basketball</button></li>
                        <li><button onclick="filterSport('NFL')" class="hover:text-white transition flex items-center"><i class="fas fa-football-ball w-6"></i> NFL Football</button></li>
                        <li><button onclick="filterSport('NHL')" class="hover:text-white transition flex items-center"><i class="fas fa-hockey-puck w-6"></i> NHL Hockey</button></li>
                    </ul>
                </div>
            </nav>
        </div>
        
        <div class="mt-auto p-6 border-t border-gray-800">
            <div class="flex items-center space-x-3">
                <div id="api-status-dot" class="w-3 h-3 bg-green-500 rounded-full status-live"></div>
                <span class="text-xs font-bold text-gray-400 uppercase">API Online (v1.0)</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">        <header class="p-5 pt-8">
            <div class="flex flex-col space-y-5">
                <p class="text-[10px] font-black tracking-[0.3em] text-center text-gray-500 uppercase">
                    Eventos de hoy <span class="text-blue-500">Jueves</span> 12/03/2026
                </p>
                
            </div>
        </header>

        <div id="main-scroll" class="flex-1 p-4">
            
            
            <div id="dynamic-content" class="space-y-12">
                <div class="flex items-center justify-center h-64">
                    <div class="text-center">
                        <i class="fas fa-circle-notch animate-spin text-4xl text-blue-500 mb-4"></i>
                        <p class="text-gray-400">Inyectando metadatos de la API...</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="playerModal" class="fixed inset-0 bg-black/95 z-50 hidden flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-6xl">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center space-x-4">
                    <img id="modal-logo" src="" class="h-10 w-10 object-contain bg-gray-800 rounded p-1">
                    <div>
                        <h2 id="modal-title" class="text-xl font-bold">--</h2>
                        <p id="modal-meta" class="text-xs text-gray-400 font-medium"></p>
                    </div>
                </div>
                <button onclick="closePlayer()" class="text-gray-400 hover:text-white text-3xl transition">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>
            <div class="aspect-video bg-black rounded-2xl overflow-hidden shadow-2xl border border-gray-800">
                <div id="player-target" class="w-full h-full"></div>
            </div>
            <div class="mt-4 grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-tighter">Status de Señal</p>
                    <p class="text-sm font-bold text-green-400"><i class="fas fa-broadcast-tower mr-2"></i> Estable (HD)</p>
                </div>
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-tighter">Espectadores</p>
                    <p id="modal-viewers" class="text-sm font-bold">--</p>
                </div>
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-tighter">Información API</p>
                    <p class="text-[10px] text-gray-500">cdn-live.tv/v1/player/ready</p>
                </div>
            </div>
        </div>
    </div>    <script>
        const API_USER = 'cdnlivetv';
        const API_PLAN = 'free';
        let store = { channels: [], sports: {}, currentTab: 'events' };

        function switchTab(tab) {
            store.currentTab = tab;
            const tEv = document.getElementById('tab-ev');
            const tCh = document.getElementById('tab-ch');
            tEv.className = `flex flex-col items-center space-y-1 ${tab === 'events' ? 'text-[#00ffaa]' : 'text-gray-500'}`;
            tCh.className = `flex flex-col items-center space-y-1 ${tab === 'channels' ? 'text-[#00ffaa]' : 'text-gray-500'}`;
            tab === 'events' ? renderAllSports() : renderAllChannels();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        async function init() {
            try {
                const [chRes, spRes] = await Promise.all([
                    fetch(`https://api.cdn-live.tv/api/v1/channels/?user=${API_USER}&plan=${API_PLAN}`),
                    fetch(`https://api.cdn-live.tv/api/v1/events/sports/?user=${API_USER}&plan=${API_PLAN}`)
                ]);
                const chData = await chRes.json();
                const spData = await spRes.json();
                store.channels = chData.channels;
                store.sports = spData['cdn-live-tv'];
                renderAllSports();
            } catch (err) { console.error(err); }
        }

        function renderAllSports() {
            const container = document.getElementById('dynamic-content');
            container.innerHTML = '<div class="space-y-8 pb-20"></div>';
            const wrapper = container.querySelector('div');
            const categories = Object.keys(store.sports);
            
            categories.forEach(cat => {
                store.sports[cat].forEach(ev => {
                    const div = document.createElement('div');
                    div.className = "animate-in fade-in duration-500";
                    div.innerHTML = renderEventCard(ev, cat);
                    wrapper.appendChild(div);
                });
            });
        }

        function renderEventCard(ev, cat) {
            const icons = { 'Soccer': '⚽', 'NBA': '🏀', 'NFL': '🏈', 'NHL': '🏒' };
            return `
                <div class="px-2">
                    <div class="flex items-center space-x-2 mb-1">
                        <span class="text-[12px] text-[#00ffaa] font-medium opacity-90">${icons[cat] || '🏆'} ${ev.tournament}</span>
                    </div>
                    <div class="flex items-center space-x-3 mb-4">
                        <span class="text-[#00ffaa] font-bold text-sm">${ev.time}</span>
                        <span class="text-gray-800 text-xs">|</span>
                        <div class="flex items-center space-x-2 flex-1">
                            <img src="${ev.homeTeamIMG}" class="h-4 w-4 object-contain" onerror="this.style.display='none'">
                            <span class="text-gray-200 text-sm">${ev.homeTeam} <span class="text-gray-500">vs</span> ${ev.awayTeam}</span>
                            <img src="${ev.awayTeamIMG}" class="h-4 w-4 object-contain" onerror="this.style.display='none'">
                        </div>
                        <img src="${ev.countryIMG}" class="h-3 w-4 rounded-sm opacity-20">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        ${ev.channels.map(ch => `
                            <button onclick="openPlayer('${ch.url}', '${ev.homeTeam} vs ${ev.awayTeam}', '${ch.image}', '${ch.viewers}', '${cat}', '${ch.channel_code}')" class="btn-ch">
                                <img src="${ch.image}">
                                <div class="absolute bottom-1 right-2 flex items-center space-x-1 opacity-20">
                                    <span class="text-[5px] text-white font-bold">${ch.channel_code || ''}</span>
                                    <span class="text-[5px] text-white">${ch.viewers}</span>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                </div>`;
        }

        function renderAllChannels() {
            const container = document.getElementById('dynamic-content');
            container.innerHTML = '<div class="grid grid-cols-2 gap-3 px-2 pb-24"></div>';
            const grid = container.querySelector('div');
            store.channels.forEach(ch => {
                const card = document.createElement('div');
                card.className = "btn-ch";
                card.onclick = () => openPlayer(ch.url, ch.name, ch.image, ch.viewers, 'General', ch.code);
                card.innerHTML = `<img src="${ch.image}"><div class="absolute top-1 right-2 flex items-center space-x-1"><span class="text-[6px] text-gray-500">${ch.viewers}</span><div class="w-1 h-1 rounded-full ${ch.status === 'online' ? 'bg-[#00ffaa]' : 'bg-red-500'}"></div></div>`;
                grid.appendChild(card);
            });
        }

        function openPlayer(url, title, logo, viewers, cat, country) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-logo').src = logo;
            document.getElementById('modal-meta').innerText = `${cat} | ${country} | HD`;
            document.getElementById('modal-viewers').innerHTML = `<i class="fas fa-users text-blue-500 mr-2"></i> ${viewers}`;
            document.getElementById('player-target').innerHTML = `<iframe src="${url}" width="100%" height="100%" frameborder="0" allow="encrypted-media" allowfullscreen></iframe>`;
            document.getElementById('playerModal').classList.remove('hidden');
        }

        function closePlayer() { document.getElementById('playerModal').classList.add('hidden'); document.getElementById('player-target').innerHTML = ''; }
        
        init();
    </script>
    
    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-lg border-t border-gray-900 px-4 py-4 flex justify-around items-center z-50">
        <button onclick="switchTab('events')" id="tab-ev" class="flex flex-col items-center space-y-1 text-blue-500">
            <i class="fas fa-calendar-alt text-xl"></i>
            <span class="text-[9px] font-bold uppercase">Eventos</span>
        </button>
        
        <button onclick="switchTab('channels')" id="tab-ch" class="flex flex-col items-center space-y-1 text-gray-500">
            <i class="fas fa-tv text-xl"></i>
            <span class="text-[9px] font-bold uppercase">Canales</span>
        </button>
    </nav>
</body>
</html>
